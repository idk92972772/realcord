<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unreal Cord — Login</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <style>
    .oauth-btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
      transition: filter .15s;
    }
    .oauth-btn:hover { filter: brightness(1.1); }
    .btn-google { background: #fff; color: #3c4043; }
    .btn-discord { background: #5865f2; color: #fff; }
    .btn-github { background: #24292e; color: #fff; }
    .divider { display: flex; align-items: center; gap: 8px; margin: 16px 0; color: var(--text-muted); font-size: 13px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--bg-hover); }
    .or-email { color: var(--accent); cursor: pointer; font-size: 13px; text-align: center; margin-top: 4px; }
    .or-email:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-container">
    <!-- OAuth Box (default) -->
    <div class="auth-box" id="oauthBox">
      <div style="text-align:center;font-size:48px;margin-bottom:8px">🎮</div>
      <h1>Welcome to Unreal Cord</h1>
      <p>Sign in to continue</p>
      <div id="oauthError" class="error-msg hidden"></div>

      <button class="oauth-btn btn-google" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>

      <button class="oauth-btn btn-github" id="githubBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        Continue with GitHub
      </button>

      <div class="divider">or</div>

      <div class="or-email" id="showEmailLogin">Sign in with Email instead</div>
    </div>

    <!-- Email Login Box -->
    <div class="auth-box hidden" id="loginBox">
      <h1>Welcome back!</h1>
      <p>Sign in with your email and password</p>
      <div id="authError" class="error-msg hidden"></div>
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="Enter your email" autocomplete="email" />
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" />
      <button class="btn" id="loginBtn">Log In</button>
      <div class="auth-switch">
        Need an account? <a id="showRegister">Register</a> &nbsp;·&nbsp; <a id="backToOauth">Back</a>
      </div>
    </div>

    <!-- Register Box -->
    <div class="auth-box hidden" id="registerBox">
      <h1>Create an account</h1>
      <p>Join Unreal Cord today.</p>
      <div id="regError" class="error-msg hidden"></div>
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="Enter your email" />
      <label>Username</label>
      <input type="text" id="regUsername" placeholder="Choose a username" maxlength="32" />
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="Create a password (min 6 chars)" />
      <button class="btn" id="registerBtn">Create Account</button>
      <div class="auth-switch">
        Already have an account? <a id="showLogin">Log in</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script type="module" src="auth.js"></script>
</body>
</html>
